<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survival Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1a1a1a;
      overflow: hidden;
    }

    #survival-game {
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      width: 100%;
      height: 100vh;
      max-width: 100%;
    }

    #survival-game canvas {
      border-radius: 4px;
      display: block;
      /* Make the square canvas as large as possible while preserving aspect ratio */
      width: min(100vw, 100vh) !important;
      height: auto !important;
      max-width: 100%;
      max-height: 100vh;
      margin: 0 auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
    }
  </style>
</head>
<body>
<div id="survival-game"></div>
<script src="js/app.js"></script>
</body>
</html>
